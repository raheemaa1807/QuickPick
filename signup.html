<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - QuickPick</title>

    <link rel="stylesheet" href="style.css" />

    <style>
      /* ONLY SIGNUP PAGE STYLES */

      .signup-container {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--eye-ball);
      }

      .signup-box {
        width: 400px;
        background: var(--pure-white);
        padding: 2rem;
        border-radius: 1.5rem;
        box-shadow: rgba(0, 0, 0, 0.1) 0 10px 25px;
        text-align: center;
      }

      .signup-box h2 {
        margin-bottom: 1rem;
      }

      .signup-box p {
        color: gray;
        margin-bottom: 1.5rem;
      }

      .input-group {
        text-align: left;
        margin-bottom: 1rem;
      }

      .input-group label {
        font-size: 0.9rem;
        display: block;
        margin-bottom: 0.3rem;
      }

      .input-group input {
        width: 100%;
        padding: 0.7rem;
        border-radius: 0.5rem;
        border: 1px solid #ccc;
        outline: none;
      }

      .signup-btn {
        width: 100%;
        margin-top: 1rem;
        padding: 0.9rem;
        border-radius: 1rem;
        border: none;
        background: var(--gold-finger);
        color: white;
        font-size: 1rem;
        cursor: pointer;
      }

      .signup-btn:hover {
        background: var(--lead);
      }

      .bottom-text {
        margin-top: 1rem;
        font-size: 0.9rem;
      }

      .bottom-text a {
        color: var(--gold-finger);
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="signup-container">
      <div class="signup-box">
        <h2>Create Account</h2>
        <p>Join QuickPick and order faster 🚀</p>

        <form id="signupForm">
          <div class="input-group">
            <label>Name</label>
            <input type="text" required />
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" required />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" required />
          </div>

          <button type="submit" class="signup-btn">Sign Up</button>
        </form>

        <p class="bottom-text">
          Already have an account?
          <a href="#">Login</a>
        </p>
      </div>
    </div>

    <script>
      const form = document.getElementById("signupForm");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const name = document.querySelector('input[type="text"]').value;

        // ✅ STORE NAME
        localStorage.setItem("quickpickUser", name);

        alert("Signup successful! 🎉");

        // Redirect to home
        window.location.href = "index.html";
      });
    </script>
  </body>
</html>
